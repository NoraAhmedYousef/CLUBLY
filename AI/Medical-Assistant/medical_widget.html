<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clubly Medical Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent:   #2ec4b6;
  --accent2:  #1a8a80;
  --dark:     #0d1117;
  --surface:  #161b22;
  --surface2: #21262d;
  --border:   #30363d;
  --text:     #e6edf3;
  --dim:      #7d8590;
  --danger:   #e85d2f;
  --shadow:   0 8px 40px rgba(0,0,0,.5);
}

/* ── Floating Button ── */
#med-fab {
  position: fixed;
  bottom: 28px; left: 28px;
  width: 58px; height: 58px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 20px rgba(46,196,182,.4);
  z-index: 9998;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  animation: fabIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
#med-fab:hover { transform: scale(1.1); }
@keyframes fabIn {
  from { transform: scale(0) rotate(-180deg); opacity:0; }
  to   { transform: scale(1) rotate(0);       opacity:1; }
}

#med-badge {
  position: absolute; top:2px; right:2px;
  width:18px; height:18px;
  background: var(--danger);
  border-radius:50%;
  font-size:10px; color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-family:'Tajawal',sans-serif; font-weight:700;
  opacity:0; transform:scale(0);
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
}
#med-badge.show { opacity:1; transform:scale(1); }

/* ── Chat Window ── */
#med-window {
  position: fixed;
  bottom: 100px; left: 28px;
  width: 370px; height: 540px;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex; flex-direction: column;
  overflow: hidden;
  z-index: 9999;
  box-shadow: var(--shadow);
  font-family: 'Tajawal', sans-serif;
  transform-origin: bottom left;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
}
#med-window.hidden {
  transform: scale(.85) translateY(20px);
  opacity: 0; pointer-events: none;
}

/* ── Header ── */
#med-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  background: linear-gradient(135deg, #0d2a28, #0a1f1e);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.med-avatar {
  width:38px; height:38px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}
.med-title h4 { font-size:14px; font-weight:700; color:var(--text); margin:0; }
.med-title span {
  font-size:11px; color:var(--accent);
  display:flex; align-items:center; gap:4px; margin-top:2px;
}
.med-title span::before {
  content:''; width:6px; height:6px;
  background:var(--accent); border-radius:50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.4;transform:scale(1.5)}
}
#med-close {
  background:none; border:none; cursor:pointer;
  color:var(--dim); font-size:18px; padding:4px;
  border-radius:6px; transition:all .2s; margin-right: auto;
}
#med-close:hover { background:var(--surface2); color:var(--text); }

/* ── Disclaimer ── */
#med-disclaimer {
  background: rgba(232,93,47,.1);
  border-bottom: 1px solid rgba(232,93,47,.2);
  padding: 8px 14px;
  font-size: 11px;
  color: #e8a87c;
  text-align: center;
  flex-shrink: 0;
}

/* ── Messages ── */
#med-messages {
  flex:1; overflow-y:auto;
  padding:14px 12px;
  display:flex; flex-direction:column; gap:10px;
  scroll-behavior:smooth;
}
#med-messages::-webkit-scrollbar { width:3px; }
#med-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.med-msg { display:flex; gap:8px; max-width:88%; animation: msgIn .3s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.med-msg.bot  { align-self:flex-start; }
.med-msg.user { align-self:flex-end; flex-direction:row-reverse; }

.med-msg-av {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; flex-shrink:0; margin-top:2px;
}
.med-msg.bot  .med-msg-av { background:var(--surface2); }
.med-msg.user .med-msg-av { background:linear-gradient(135deg,#0d2a28,#091e1d); }

.med-bubble {
  padding:9px 13px; border-radius:14px;
  font-size:13px; line-height:1.7;
}
.med-msg.bot .med-bubble {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px 14px 14px 14px;
  color:var(--text);
  direction: rtl; text-align: right;
}
.med-msg.user .med-bubble {
  background:linear-gradient(135deg,#0d2a28,#0a1f1e);
  border:1px solid rgba(46,196,182,.2);
  border-radius:14px 4px 14px 14px;
  color:var(--text);
}
.med-bubble strong { color:var(--accent); }
.med-bubble .warn  { color:var(--danger); font-weight:700; }

/* ── Quick Suggestions ── */
#med-suggestions {
  display:flex; gap:6px; overflow-x:auto;
  padding:6px 12px; flex-shrink:0;
  scrollbar-width:none;
  border-top:1px solid var(--border);
}
#med-suggestions::-webkit-scrollbar { display:none; }
.med-sug {
  background:var(--surface2); border:1px solid var(--border);
  color:var(--dim); padding:5px 11px;
  border-radius:20px; cursor:pointer;
  font-size:11px; white-space:nowrap;
  font-family:'Tajawal',sans-serif;
  transition:all .2s; flex-shrink:0;
}
.med-sug:hover { border-color:var(--accent); color:var(--accent); background:rgba(46,196,182,.06); }

/* ── Input ── */
#med-input-row {
  display:flex; gap:8px; padding:10px 12px;
  background:var(--surface);
  border-top:1px solid var(--border);
  flex-shrink:0;
}
#med-input {
  flex:1; background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px; padding:9px 12px;
  color:var(--text); font-family:'Tajawal',sans-serif;
  font-size:13px; outline:none; resize:none;
  max-height:80px; line-height:1.5;
  transition:border-color .2s;
}
#med-input:focus { border-color:var(--accent); }
#med-input::placeholder { color:var(--dim); }

#med-send {
  width:38px; height:38px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; border-radius:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; align-self:flex-end;
  box-shadow:0 2px 10px rgba(46,196,182,.3);
}
#med-send:hover { transform:scale(1.07); }
#med-send svg { width:15px; height:15px; fill:#000; }

/* ── Typing ── */
.med-typing { display:flex; gap:4px; padding:3px 0; }
.med-typing span {
  width:6px; height:6px;
  background:var(--accent); border-radius:50%;
  animation:bounce 1.2s infinite;
}
.med-typing span:nth-child(2){animation-delay:.2s}
.med-typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce {
  0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)}
}

/* ── Responsive ── */
@media(max-width:480px){
  #med-window{left:0;right:0;bottom:0;width:100%;height:85vh;border-radius:20px 20px 0 0;}
  #med-window.hidden{transform:translateY(100%);}
  #med-fab{left:16px;bottom:16px;}
}
</style>
</head>
<body style="background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;">

<div style="text-align:center;color:#666;font-family:'Tajawal',sans-serif;">
  <div style="font-size:48px;margin-bottom:16px;">🏥</div>
  <p style="font-size:16px;">الويدجت شغّال في الكورنر</p>
  <p style="font-size:13px;margin-top:8px;color:#444;">اضغط على الزر الأخضر 👇</p>
</div>

<!-- Floating Button -->
<button id="med-fab" onclick="medToggle()">
  🩺
  <div id="med-badge">1</div>
</button>

<!-- Chat Window -->
<div id="med-window" class="hidden">

  <div id="med-header">
    <div class="med-avatar">🩺</div>
    <div class="med-title">
      <h4>Clubly Medical Assistant</h4>
      <span>مساعد طبي رياضي</span>
    </div>
    <button id="med-close" onclick="medToggle()">✕</button>
  </div>

  <div id="med-disclaimer">
    ⚠️ للإرشاد فقط — لا يُغني عن استشارة الطبيب
  </div>

  <div id="med-messages">
    <div class="med-msg bot">
      <div class="med-msg-av">🩺</div>
      <div class="med-bubble">
        أهلاً! أنا <strong>Clubly Medical Assistant</strong> 🏥<br>
        يمكنني مساعدتك في الإصابات الرياضية، التغذية، والحالات الصحية المختلفة.<br>
        <span class="warn">⚠️ معلوماتي للإرشاد فقط، دائماً راجع طبيبك.</span>
      </div>
    </div>
  </div>

  <div id="med-suggestions">
    <button class="med-sug" onclick="medSuggest(this)">التواء في الكاحل</button>
    <button class="med-sug" onclick="medSuggest(this)">رياضة مناسبة لمريض السكر</button>
    <button class="med-sug" onclick="medSuggest(this)">تغذية قبل التمرين</button>
    <button class="med-sug" onclick="medSuggest(this)">ألم في الركبة</button>
    <button class="med-sug" onclick="medSuggest(this)">رياضة لمريض الضغط</button>
  </div>

  <div id="med-input-row">
    <textarea id="med-input" rows="1" placeholder="اسأل عن إصابة أو حالة صحية..."></textarea>
    <button id="med-send" onclick="medSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
(function() {

const API_URL    = '/medical-chat';
const SESSION_ID = 'med_' + Math.random().toString(36).slice(2, 9);
let isOpen    = false;
let isLoading = false;

const win    = document.getElementById('med-window');
const msgs   = document.getElementById('med-messages');
const input  = document.getElementById('med-input');
const badge  = document.getElementById('med-badge');
const suggs  = document.getElementById('med-suggestions');

// Toggle
window.medToggle = function() {
  isOpen = !isOpen;
  win.classList.toggle('hidden', !isOpen);
  const fab = document.getElementById('med-fab');
  if (isOpen) {
    badge.classList.remove('show');
    fab.textContent = '✕';
    fab.appendChild(badge);
    setTimeout(() => input.focus(), 300);
    scrollBottom();
  } else {
    fab.textContent = '🩺';
    fab.appendChild(badge);
  }
};

setTimeout(() => { if (!isOpen) badge.classList.add('show'); }, 3000);

function scrollBottom() {
  setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 80);
}

function addMsg(role, html) {
  const wrap   = document.createElement('div');
  wrap.className = `med-msg ${role}`;
  const av     = document.createElement('div');
  av.className = 'med-msg-av';
  av.textContent = role === 'bot' ? '🩺' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'med-bubble';
  bubble.innerHTML = html;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const w = document.createElement('div');
  w.className = 'med-msg bot'; w.id = 'med-typing';
  w.innerHTML = `<div class="med-msg-av">🩺</div>
    <div class="med-bubble"><div class="med-typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(w);
  scrollBottom();
}
function removeTyping() { document.getElementById('med-typing')?.remove(); }

function fmt(text) {
  let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/⚠️(.+)/g, '<div class="warn">⚠️$1</div>');
  t = t.replace(/🚨(.+)/g, '<div class="warn">🚨$1</div>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/^### (.+)$/gm, '<div style="color:var(--accent);font-weight:800;margin:8px 0 3px">$1</div>');
  t = t.replace(/^## (.+)$/gm,  '<div style="font-weight:700;margin:6px 0 3px;border-bottom:1px solid var(--border);padding-bottom:3px">$1</div>');
  t = t.replace(/^(\d+)\. (.+)$/gm, '<div style="margin:3px 0"><span style="color:var(--accent);font-weight:700">$1.</span> $2</div>');
  t = t.replace(/^[-*] (.+)$/gm, '<div style="margin:3px 0">• $1</div>');
  t = t.replace(/\n{2,}/g, '<br><br>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

window.medSend = async function() {
  const text = input.value.trim();
  if (!text || isLoading) return;
  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  suggs.style.display = 'none';

  addMsg('user', text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: SESSION_ID })
    });
    removeTyping();
    if (!res.ok) {
      const err = await res.json();
      addMsg('bot', `⚠️ ${err.error || 'حدث خطأ، حاول مرة أخرى'}`);
    } else {
      const data = await res.json();
      addMsg('bot', fmt(data.reply));
      if (!isOpen) badge.classList.add('show');
    }
  } catch(e) {
    removeTyping();
    addMsg('bot', '⚠️ مش قادر أتصل بالسيرفر، حاول تاني.');
  }
  isLoading = false;
};

window.medSuggest = function(btn) {
  if (!isOpen) medToggle();
  input.value = btn.textContent;
  medSend();
};

input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); medSend(); }
});

})();
</script>
</body>
</html>
