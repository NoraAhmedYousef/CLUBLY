<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sports AI — اكتشف رياضتك</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:     #f4f0e8;
  --card:   #ffffff;
  --dark:   #111827;
  --orange: #f97316;
  --teal:   #14b8a6;
  --pink:   #ec4899;
  --blue:   #3b82f6;
  --green:  #22c55e;
  --border: #e5e7eb;
  --text:   #1f2937;
  --dim:    #9ca3af;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* blobs */
.blob { position:fixed; border-radius:50%; filter:blur(80px); opacity:.12; pointer-events:none; z-index:0; }
.blob-1 { width:400px;height:400px;background:var(--orange);top:-80px;right:-80px; }
.blob-2 { width:350px;height:350px;background:var(--teal);bottom:-80px;left:-80px; }

/* hero */
.hero { position:relative;z-index:1;text-align:center;padding:36px 20px 24px; }
.hero h1 { font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,7vw,80px);line-height:.9;letter-spacing:2px; }
.hero h1 span { background:linear-gradient(90deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.hero p { font-size:14px;color:var(--dim);margin-top:8px; }

/* layout */
.wrap { position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:1.4fr 1fr;gap:20px;align-items:start; }
@media(max-width:700px){.wrap{grid-template-columns:1fr;}}

/* card */
.card { background:var(--card);border-radius:20px;padding:22px;box-shadow:0 8px 30px rgba(0,0,0,.08);border:1px solid rgba(255,255,255,.9); }
.card-title { font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px; }
.dot { width:10px;height:10px;border-radius:50%; }

/* form rows */
.row3 { display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px; }
.row2 { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px; }

.field label { display:block;font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px; }
.field input, .field select {
  width:100%;background:var(--bg);border:2px solid transparent;border-radius:10px;
  padding:8px 10px;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;
}
.field input:focus,.field select:focus { border-color:var(--orange);background:#fff; }

/* toggles */
.trow { margin-bottom:10px; }
.trow label { display:block;font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px; }
.tgroup { display:flex;gap:5px;flex-wrap:wrap; }
.tbtn {
  background:var(--bg);border:2px solid transparent;border-radius:8px;
  padding:5px 11px;font-family:'Tajawal',sans-serif;font-size:12px;
  cursor:pointer;transition:all .15s;color:var(--dim);font-weight:500;
}
.tbtn.active { font-weight:700;border-color:currentColor; }
.tbtn.or.active { color:var(--orange);background:rgba(249,115,22,.08); }
.tbtn.tl.active { color:var(--teal);background:rgba(20,184,166,.08); }
.tbtn.pk.active { color:var(--pink);background:rgba(236,72,153,.08); }
.tbtn.bl.active { color:var(--blue);background:rgba(59,130,246,.08); }
.tbtn.gn.active { color:var(--green);background:rgba(34,197,94,.08); }
.tbtn.yw.active { color:#d97706;background:rgba(251,191,36,.1); }

/* submit */
.submit-btn {
  width:100%;margin-top:14px;
  background:linear-gradient(135deg,var(--orange),var(--pink));
  border:none;border-radius:12px;padding:13px;
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;
  color:#fff;cursor:pointer;transition:all .2s;
  box-shadow:0 6px 20px rgba(249,115,22,.3);
}
.submit-btn:hover { transform:translateY(-2px);box-shadow:0 10px 28px rgba(249,115,22,.4); }
.submit-btn:disabled { opacity:.6;cursor:not-allowed;transform:none; }

/* results */
.results-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:14px; }
.results-count { background:var(--dark);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700; }

.sport-item {
  display:flex;align-items:center;gap:10px;padding:11px 12px;
  border-radius:12px;border:2px solid var(--border);margin-bottom:8px;
  cursor:pointer;transition:all .2s;
}
.sport-item:hover { border-color:var(--orange);transform:translateX(-3px); }
.sport-item.active { border-color:var(--orange);background:rgba(249,115,22,.04); }

.rank { width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;background:var(--bg);color:var(--dim);flex-shrink:0; }
.sport-item:nth-child(1) .rank { background:linear-gradient(135deg,#ffd700,#ffb800);color:#000; }
.sport-item:nth-child(2) .rank { background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#000; }
.sport-item:nth-child(3) .rank { background:linear-gradient(135deg,#cd7f32,#b8642a);color:#fff; }

.sinfo { flex:1; }
.sname { font-size:14px;font-weight:700;color:var(--dark); }
.stags { display:flex;gap:4px;margin-top:3px;flex-wrap:wrap; }
.stag { font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;text-transform:uppercase; }
.td-Low    { background:rgba(34,197,94,.1);color:var(--green); }
.td-Medium { background:rgba(251,191,36,.15);color:#d97706; }
.td-High   { background:rgba(236,72,153,.1);color:var(--pink); }
.te        { background:rgba(59,130,246,.1);color:var(--blue); }
.tt        { background:rgba(20,184,166,.1);color:var(--teal); }
.tb-Low    { background:rgba(34,197,94,.1);color:var(--green); }
.tb-Medium { background:rgba(251,191,36,.1);color:#d97706; }
.tb-High   { background:rgba(236,72,153,.1);color:var(--pink); }

.sbar { width:64px;flex-shrink:0; }
.sbar-track { height:5px;background:var(--bg);border-radius:3px;overflow:hidden; }
.sbar-fill { height:100%;background:linear-gradient(90deg,var(--orange),var(--pink));border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1);width:0; }
.sbar-pct { font-size:10px;color:var(--dim);text-align:center;margin-top:2px;font-weight:700; }

/* loading */
.loading { display:none;text-align:center;padding:36px; }
.ldots { display:flex;gap:7px;justify-content:center; }
.ldots span { width:10px;height:10px;border-radius:50%;animation:ldot 1.2s infinite; }
.ldots span:nth-child(1){background:var(--orange);animation-delay:0s}
.ldots span:nth-child(2){background:var(--pink);animation-delay:.2s}
.ldots span:nth-child(3){background:var(--teal);animation-delay:.4s}
@keyframes ldot{0%,60%,100%{transform:scale(.8);opacity:.5}30%{transform:scale(1.3);opacity:1}}
.loading p { margin-top:12px;color:var(--dim);font-size:13px; }

/* empty */
.empty { text-align:center;padding:40px 20px; }
.empty .emoji { font-size:44px;margin-bottom:12px; }
.empty p { color:var(--dim);font-size:13px;line-height:1.7; }

/* detail */
#detail-panel { display:none;grid-column:1/-1; }
.detail-card { background:var(--dark);border-radius:20px;padding:28px;color:#fff;position:relative;overflow:hidden; }
.detail-card::before { content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(249,115,22,.2),transparent 70%);pointer-events:none; }
.detail-header { display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px; }
.detail-name { font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:3px;background:linear-gradient(90deg,var(--orange),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1; }
.detail-close { background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;transition:background .2s;flex-shrink:0; }
.detail-close:hover { background:rgba(255,255,255,.2); }
.detail-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px; }
@media(max-width:500px){.detail-grid{grid-template-columns:repeat(2,1fr);}}
.dstat { background:rgba(255,255,255,.07);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,.08); }
.dstat-label { font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px; }
.dstat-val { font-size:20px;font-weight:900;margin-top:3px; }
.dstat-val.or{color:var(--orange)} .dstat-val.tl{color:var(--teal)} .dstat-val.pk{color:var(--pink)} .dstat-val.gn{color:var(--green)}
.detail-desc { font-size:13px;color:rgba(255,255,255,.65);line-height:1.8;background:rgba(255,255,255,.05);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.07); }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="hero">
  <h1>اكتشف <span>رياضتك</span></h1>
  <p>أدخل بياناتك واحصل على توصيات مخصصة بالذكاء الاصطناعي</p>
</div>

<div class="wrap">

  <!-- FORM -->
  <div class="card">
    <div class="card-title"><div class="dot" style="background:var(--orange)"></div>بياناتك</div>

    <div class="row3" style="grid-template-columns:1fr 1fr 1fr 1fr">
      <div class="field"><label>العمر</label><input type="number" id="age" value="25" min="8" max="80"/></div>
      <div class="field"><label>الوزن (كجم)</label><input type="number" id="weight" value="75"/></div>
      <div class="field"><label>الطول (سم)</label><input type="number" id="height" value="178"/></div>
      <div class="field"><label>الجنس</label>
        <select id="gender"><option value="Male">ذكر</option><option value="Female">أنثى</option></select>
      </div>
    </div>

    <div class="row3" style="grid-template-columns:1fr 1fr 1fr 1fr">
      <div class="field"><label>الميزانية ($)</label><input type="number" id="budget" value="80"/></div>
      <div class="field"><label>ساعات / أسبوع</label><input type="number" id="hours" value="6"/></div>
      <div class="field"><label>المنطقة</label>
        <select id="location"><option value="Urban">مدينة</option><option value="Suburban">ضاحية</option><option value="Rural">ريف</option></select>
      </div>
      <div class="field"><label>مشاكل صحية</label>
        <select id="health">
          <option value="None">لا يوجد</option>
          <option value="Knee Pain">ألم ركبة</option>
          <option value="Back Pain">ألم ظهر</option>
          <option value="Heart Condition">قلب</option>

        </select>
      </div>
    </div>

    <div class="trow">
      <label>مستوى اللياقة</label>
      <div class="tgroup">
        <button class="tbtn or" data-f="fitness" data-v="Beginner">مبتدئ</button>
        <button class="tbtn or active" data-f="fitness" data-v="Intermediate">متوسط</button>
        <button class="tbtn or" data-f="fitness" data-v="Advanced">متقدم</button>

    </div>

    <div class="trow">
      <label>مستوى النشاط</label>
      <div class="tgroup">

        <button class="tbtn tl" data-f="activity" data-v="Lightly Active">خفيف</button>
        <button class="tbtn tl active" data-f="activity" data-v="Moderately Active">معتدل</button>
        <button class="tbtn tl" data-f="activity" data-v="Very Active">نشيط جداً</button>
      </div>
    </div>

    <div class="trow">
      <label>الهدف</label>
      <div class="tgroup">
        <button class="tbtn pk" data-f="goal" data-v="Stay Healthy">صحة</button>
        <button class="tbtn pk" data-f="goal" data-v="Lose Weight">وزن</button>
        <button class="tbtn pk active" data-f="goal" data-v="Build Muscle">عضلات</button>
        <button class="tbtn pk" data-f="goal" data-v="Improve Endurance">تحمّل</button>
        <button class="tbtn pk" data-f="goal" data-v="Reduce Stress">استرخاء</button>
        <button class="tbtn pk" data-f="goal" data-v="Have Fun">متعة</button>
      </div>
    </div>

    <div class="trow">
      <label>الشخصية</label>
      <div class="tgroup">
        <button class="tbtn bl active" data-f="personality" data-v="Introvert">انطوائي</button>
        <button class="tbtn bl" data-f="personality" data-v="Ambivert">متوسط</button>
        <button class="tbtn bl" data-f="personality" data-v="Extrovert">اجتماعي</button>
      </div>
    </div>

    <div class="trow">
      <label>تفضيلات</label>
      <div class="tgroup">
        <button class="tbtn yw" id="team-btn" data-active="0">👥 جماعية</button>
        <button class="tbtn yw" id="outdoor-btn" data-active="0">🌳 خارجية</button>
      </div>
    </div>

    <button class="submit-btn" onclick="getRecs()">🔍 اكتشف رياضتك</button>
  </div>

  <!-- RESULTS -->
  <div class="card">
    <div id="empty-state" class="empty">
      <div class="emoji">🏆</div>
      <p>أدخل بياناتك واضغط<br/><strong>اكتشف رياضتك</strong></p>
    </div>
    <div class="loading" id="loading">
      <div class="ldots"><span></span><span></span><span></span></div>
      <p>جاري التحليل...</p>
    </div>
    <div id="results-panel" style="display:none">
      <div class="results-header">
        <div class="card-title" style="margin:0"><div class="dot" style="background:var(--teal)"></div>توصياتك</div>
        <div class="results-count" id="rcount">5 رياضات</div>
      </div>
      <div id="sports-list"></div>
    </div>
  </div>

  <!-- DETAIL -->
  <div id="detail-panel">
    <div class="detail-card">
      <div class="detail-header">
        <div>
          <div style="font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px">التفاصيل</div>
          <div class="detail-name" id="dname">—</div>
        </div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-grid">
        <div class="dstat"><div class="dstat-label">سعرات / ساعة</div><div class="dstat-val or" id="dcal">—</div></div>
        <div class="dstat"><div class="dstat-label">الصعوبة</div><div class="dstat-val tl" id="ddiff">—</div></div>
        <div class="dstat"><div class="dstat-label">البيئة</div><div class="dstat-val pk" id="denv">—</div></div>
        <div class="dstat"><div class="dstat-label">التكلفة</div><div class="dstat-val gn" id="dbudget">—</div></div>
      </div>
      <div class="detail-desc" id="ddesc">—</div>
    </div>
  </div>

</div>

const SPORT_DATA = {

  "Kids Martial Arts":{cal:400,diff:"Low",env:"Indoor",budget:"Low",type:"Individual"},
};

const DESCS = {
  "Gym":"تدريبات متنوعة تشمل الأثقال والكارديو، مثالية لبناء العضلات وحرق الدهون.",
  "Swimming":"رياضة مائية لكل الأعمار، تقوي الجسم كاملاً بدون ضغط على المفاصل.",
  "Yoga":"تجمع المرونة والتأمل، تخفف التوتر وتحسّن التوازن والتنفس.",
  "Football":"أكثر الرياضات شعبية، تنمّي التعاون والقدرة البدنية.",
  "CrossFit":"تدريبات عالية الكثافة تجمع القوة والتحمل.",
  "Bodybuilding":"تركيز كامل على بناء الكتلة العضلية وتشكيل الجسم.",
  "Boxing":"رياضة قتالية تحسّن التنسيق والسرعة والقوة.",
  "Marathon Running":"رياضة التحمل الأولى، تبني القدرة العقلية والجسدية.",
};
const defaultDesc = "رياضة ممتازة تناسب مستواك وأهدافك. تمرّن بانتظام وستلاحظ الفرق 💪";

// state
const state = { fitness:"Intermediate", activity:"Moderately Active", goal:"Build Muscle", personality:"Introvert" };

document.querySelectorAll('.tbtn[data-f]').forEach(b => {
  b.addEventListener('click', function() {
    document.querySelectorAll(`.tbtn[data-f="${this.dataset.f}"]`).forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    state[this.dataset.f] = this.dataset.v;
  });
});

['team-btn','outdoor-btn'].forEach(id => {
  document.getElementById(id).addEventListener('click', function() {
    const on = this.dataset.active === '1';
    this.dataset.active = on ? '0' : '1';
    this.classList.toggle('active', !on);
  });
});

async function getRecs() {
  const payload = {
    age:                    parseInt(document.getElementById('age').value)||25,
    gender:                 document.getElementById('gender').value,
    weight_kg:              parseFloat(document.getElementById('weight').value)||75,
    height_cm:              parseFloat(document.getElementById('height').value)||178,
    monthly_budget_usd:     parseFloat(document.getElementById('budget').value)||80,
    hours_available_per_week: parseFloat(document.getElementById('hours').value)||6,
    location:               document.getElementById('location').value,
    health_issue:           document.getElementById('health').value,
    fitness_level:          state.fitness,
    activity_level:         state.activity,
    goal:                   state.goal,
    personality:            state.personality,
    prefers_team_sport:     document.getElementById('team-btn').dataset.active==='1'?1:0,
    prefers_outdoor:        document.getElementById('outdoor-btn').dataset.active==='1'?1:0,
    top_n: 5
  };

  document.getElementById('empty-state').style.display='none';
  document.getElementById('results-panel').style.display='none';
  document.getElementById('detail-panel').style.display='none';
  document.getElementById('loading').style.display='block';
  document.querySelector('.submit-btn').disabled=true;

  try {
    const res  = await fetch(`${API}/recommend`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data = await res.json();
    document.getElementById('loading').style.display='none';
    document.querySelector('.submit-btn').disabled=false;
    if (!res.ok||!data.recommendations){alert(data.error||'حصل خطأ');document.getElementById('empty-state').style.display='block';return;}
    renderResults(data.recommendations);
  } catch(e) {
    document.getElementById('loading').style.display='none';
    document.querySelector('.submit-btn').disabled=false;
    document.getElementById('empty-state').style.display='block';
    alert('تأكد إن Flask شغّال على localhost:5000');
  }
}

function renderResults(recs) {
  const list = document.getElementById('sports-list');
  list.innerHTML='';
  document.getElementById('rcount').textContent=`${recs.length} رياضات`;
  recs.forEach((rec,i) => {
    const d = SPORT_DATA[rec.sport]||{};
    const pct = Math.round(rec.confidence*100);
    const el = document.createElement('div');
    el.className='sport-item';
    el.innerHTML=`
      <div class="rank">${i+1}</div>
      <div class="sinfo">
        <div class="sname">${rec.sport}</div>
        <div class="stags">
          <span class="stag td-${d.diff||'Medium'}">${d.diff||'—'}</span>
          <span class="stag te">${d.env||'—'}</span>
          <span class="stag tt">${d.type||'—'}</span>
          <span class="stag tb-${d.budget||'Medium'}">${d.budget||'—'}</span>
        </div>
      </div>
      <div class="sbar">
        <div class="sbar-track"><div class="sbar-fill" data-p="${pct}"></div></div>
        <div class="sbar-pct">${pct}%</div>
      </div>`;
    el.addEventListener('click',()=>showDetail(rec.sport,el));
    list.appendChild(el);
  });
  document.getElementById('results-panel').style.display='block';
  setTimeout(()=>{ document.querySelectorAll('.sbar-fill').forEach(b=>b.style.width=b.dataset.p+'%'); },100);
}

function showDetail(sport, el) {
  document.querySelectorAll('.sport-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  const d = SPORT_DATA[sport]||{};
  document.getElementById('dname').textContent   = sport;
  document.getElementById('dcal').textContent    = (d.cal||'—')+' kcal';
  document.getElementById('ddiff').textContent   = d.diff||'—';
  document.getElementById('denv').textContent    = d.env||'—';
  document.getElementById('dbudget').textContent = d.budget||'—';
  document.getElementById('ddesc').textContent   = DESCS[sport]||defaultDesc;
  const panel = document.getElementById('detail-panel');
  panel.style.display='block';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDetail() {
  document.getElementById('detail-panel').style.display='none';
  document.querySelectorAll('.sport-item').forEach(x=>x.classList.remove('active'));
}
</script>
</body>
</html>
